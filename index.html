
<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <title>SLOTCA – Pralnice cistern</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    #map {
      height: 500px;
      width: 100%;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 10px 0 0 0;
    }
    li {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
    }
    li:hover {
      background: #f5f5f5;
    }
  </style>
</head>
<body>

  <div id="map"></div>
  <ul id="list"></ul>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    var map = L.map("map").setView([46.1512, 14.9955], 8);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    function capitalizeWords(text) {
      return text.toLowerCase().replace(/\b\w/g, function (char) {
        return char.toUpperCase();
      });
    }

    var pralnice = [
      {
        ime: "forbiz d.o.o.",
        naslov: "Struževo 88, 4000 Kranj",
        lat: 46.2389,
        lng: 14.3556,
        url: "https://www.forbiz.si"
      },
      {
        ime: "križan d.o.o.",
        naslov: "Industrijska ulica 60, 2230 Lenart v Slov. goricah",
        lat: 46.5739,
        lng: 15.8255,
        url: "http://www.krizan.si"
      },
      {
        ime: "preza d.o.o.",
        naslov: "Krumperška ulica 19, 1230 Domžale",
        lat: 46.1331,
        lng: 14.6108,
        url: "http://www.preza.si"
      },
      {
        ime: "škofic promet d.o.o.",
        naslov: "Polica 25, 4202 Naklo",
        lat: 46.2615,
        lng: 14.3283,
        url: "http://www.skofic.si"
      }
    ];

    pralnice.forEach(p => p.ime = capitalizeWords(p.ime));

    pralnice.sort((a, b) =>
      a.ime.localeCompare(b.ime, "sl", { sensitivity: "base" })
    );

    pralnice.forEach(function (p) {
      var marker = L.marker([p.lat, p.lng])
        .addTo(map)
        .bindPopup(
          "<strong>" + p.ime + "</strong><br>" +
          p.naslov + "<br>" +
          '<a href="' + p.url + '" target="_blank">Spletna stran</a>'
        );

      var li = document.createElement("li");
      li.innerHTML = "<strong>" + p.ime + "</strong><br>" + p.naslov;
      li.onclick = function () {
        map.setView([p.lat, p.lng], 13);
        marker.openPopup();
      };

      document.getElementById("list").appendChild(li);
    });
  </script>

</body>
</html>
